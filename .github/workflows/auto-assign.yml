
name: Auto Assign Contributor

on:
  issue_comment:
    types:
      - created

jobs:
  assign:
    name: Assign Contributor
    if: github.event.issue.pull_request == null
    runs-on: ubuntu-latest

    permissions:
      issues: write

    steps:
      - name: Auto Assign
        uses: actions/github-script@v9
        with:
          script: |
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const commenter = context.payload.comment.user.login;
            const commentBody = context.payload.comment.body;

            const body = commentBody.toLowerCase();

            const shouldAssign =
              body.includes('/assign') ||
              body.includes(`@${owner.toLowerCase()}`);

            // Ignore unrelated comments
            if (!shouldAssign) {
              return;
            }

            // Fetch issue details
            const { data: issue } = await github.rest.issues.get({
              owner,
              repo,
              issue_number,
            });

            const assignees = issue.assignees || [];

            // Issue already assigned
            if (assignees.length > 0) {
              const currentAssignee = assignees[0].login;

              // Same user already assigned
              if (currentAssignee === commenter) {
                return;
              }

              // Assigned to someone else
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body: `This issue is currently assigned to @${currentAssignee}. Please look for another unassigned issue.`,
              });

              return;
            }

            // Assign commenter
            await github.rest.issues.addAssignees({
              owner,
              repo,
              issue_number,
              assignees: [commenter],
            });

            // Confirmation comment
            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number,
              body: `Assigned @${commenter} to this issue. Thank you for contributing! If you enjoy the project, consider giving the repository a 🌟.`,
            });

